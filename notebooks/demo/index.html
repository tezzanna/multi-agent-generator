<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Дашборд продаж</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;background:#f4f6f9;color:#333;}
  .header{background:#2c3e50;color:#fff;padding:1rem;text-align:center;}
  .container{max-width:1200px;margin:0 auto;padding:1rem;}
  .filters{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;background:#fff;padding:1rem;border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .filters label{display:block;font-weight:600;margin-bottom:0.25rem;}
  .filters input, .filters select{padding:0.5rem;border:1px solid #ccc;border-radius:4px;width:200px;box-sizing:border-box;}
  .filters button{padding:0.5rem 1rem;border:none;border-radius:4px;background:#27ae60;color:#fff;cursor:pointer;font-weight:600;}
  .dashboard{display:flex;flex-wrap:wrap;gap:1rem;}
  .table-wrapper{flex:2 1 400px;background:#fff;padding:1rem;border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow-x:auto;}
  .chart-wrapper{flex:1 1 400px;background:#fff;padding:1rem;border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.1);}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #e0e0e0;}
  th{background:#f8f9fa;cursor:pointer;position:relative;}
  th.sorted-asc::after{content:"▲";position:absolute;right:8px;font-size:0.6rem;}
  th.sorted-desc::after{content:"▼";position:absolute;right:8px;font-size:0.6rem;}
  @media(max-width:768px){.dashboard{flex-direction:column;}}
</style>
</head>
<body>
<div class="header"><h1>Sales Dashboard App</h1></div>
<div class="container">
  <section class="filters" id="filtersSection">
    <div>
      <label for="startDate">Дата начала</label>
      <input type="date" id="startDate" name="startDate">
    </div>
    <div>
      <label for="endDate">Дата окончания</label>
      <input type="date" id="endDate" name="endDate">
    </div>
    <div>
      <label for="categorySelect">Категория</label>
      <select id="categorySelect" name="categorySelect">
        <option value="">Все</option>
      </select>
    </div>
    <div>
      <label for="minTotal">Минимальная сумма</label>
      <input type="number" id="minTotal" name="minTotal" min="0" step="0.01">
    </div>
    <div style="display:flex;align-items:flex-end;">
      <button id="applyFilters">Применить</button>
    </div>
  </section>
  <section class="dashboard">
    <div class="table-wrapper" id="tableWrapper">
      <table id="salesTable">
        <thead>
          <tr>
            <th data-field="productName" class="sortable">Наименование</th>
            <th data-field="category" class="sortable">Категория</th>
            <th data-field="saleDate" class="sortable">Дата продажи</th>
            <th data-field="quantity" class="sortable">Кол-во</th>
            <th data-field="totalAmount" class="sortable">Сумма</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div style="text-align:center;margin-top:1rem;" id="tablePagination"></div>
    </div>
    <div class="chart-wrapper" id="chartWrapper">
      <canvas id="mainChart"></canvas>
    </div>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.3/dist/chart.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
